name = "game-lobby"
main = "src/index.js"
compatibility_date = "2024-01-01"

# NOTE: dev-only `[assets]` block intentionally lives in the npm `dev` script
# as a `--assets ../` CLI flag, NOT in this file. If we put it here, every
# `wrangler deploy` would upload the entire worktree (.claude/, .omc/, etc.)
# as assets to the game-lobby worker and conflict with the separate
# Pages-style web-game-lab worker that already serves static files in prod.

[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"

[[durable_objects.bindings]]
name = "WORLD_CHANNEL"
class_name = "WorldChannel"

[[d1_databases]]
binding = "DB"
database_name = "web-game-lab-scores"
database_id = "50c32806-334a-49db-93c8-7c7cc123b40c"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["WorldChannel"]
