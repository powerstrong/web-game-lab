<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Game Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&family=Outfit:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/lab.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">LOGIN FREE PARTY GAME</p>
        <h1>
          링크 하나면
          <span>우리끼리 바로 게임</span>
        </h1>
        <p class="hero-copy">
          설명 길게 안 봐도 됩니다. 이름 쓰고, 친구 부르고, 바로 시작하세요.
        </p>

        <div class="hero-actions">
          <a class="cta-button" href="./lobby/index.html">바로 시작</a>
          <p class="hero-note">로그인 없음 · 설치 없음 · 방 코드 공유</p>
        </div>

        <div class="quick-steps" aria-label="빠른 이용 방법">
          <div class="step">
            <strong>1</strong>
            <span>방 만들기</span>
          </div>
          <div class="step">
            <strong>2</strong>
            <span>친구 초대</span>
          </div>
          <div class="step">
            <strong>3</strong>
            <span>투표 후 시작</span>
          </div>
        </div>

        <div class="game-strip" aria-label="게임 목록">
          <a class="game-pill" href="./prototypes/dodge-square/index.html">
            <strong>네모 피하기</strong>
            <span>끝까지 버텨라</span>
          </a>
          <a class="game-pill" href="./prototypes/rhythm-tap/index.html">
            <strong>박자 맞추기</strong>
            <span>정확하게 눌러라</span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
