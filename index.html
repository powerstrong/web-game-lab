<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Game Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&family=Outfit:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/lab.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">MULTIPLAYER MINI ARCADE</p>
        <h1>
          친구만 모이면
          <span>바로 시작되는 한 판</span>
        </h1>
        <p class="hero-copy">
          로그인 없이 입장하고, 방 코드로 바로 모입니다.
          짧게 붙고 시원하게 끝나는 멀티플레이 미니게임을 즐겨보세요.
        </p>

        <div class="hero-actions">
          <a class="cta-button" href="./lobby/index.html">게임 시작하기</a>
          <p class="hero-note">빠른 입장 · 실시간 로비 · 바로 플레이</p>
        </div>

        <div class="quick-steps" aria-label="빠른 이용 방법">
          <div class="step">
            <strong>1</strong>
            <span>방 생성</span>
          </div>
          <div class="step">
            <strong>2</strong>
            <span>친구 초대</span>
          </div>
          <div class="step">
            <strong>3</strong>
            <span>게임 시작</span>
          </div>
        </div>

        <div class="game-strip" aria-label="게임 목록">
          <a class="game-pill" href="./prototypes/dodge-square/index.html">
            <strong>네모 피하기</strong>
            <span>끝까지 살아남는 쪽이 이깁니다</span>
          </a>
          <a class="game-pill" href="./prototypes/rhythm-tap/index.html">
            <strong>박자 맞추기</strong>
            <span>타이밍이 정확할수록 점수가 올라갑니다</span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
