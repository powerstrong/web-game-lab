<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dodge Square</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="panel">
        <p class="eyebrow">Reflex Prototype</p>
        <h1>Dodge Square</h1>
        <p class="summary">
          방향키로 파란 사각형을 움직여 붉은 추적자를 피하세요. 오래 버틸수록
          점수가 오릅니다.
        </p>
      </section>

      <section class="panel">
        <div class="hud">
          <span id="score">Time 0.0s</span>
          <span id="message">Press restart to begin</span>
          <button id="restart" type="button">Restart</button>
        </div>
        <div id="arena" class="arena">
          <div id="player" class="player"></div>
          <div id="enemy" class="enemy"></div>
        </div>
      </section>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
