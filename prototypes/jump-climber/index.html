<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>말랑프렌즈 점프</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="game-shell">
      <section id="setupScreen" class="screen screen--setup is-active">
        <div class="main-banner">
          <img src="/assets/main banner.png" alt="말랑프렌즈 아케이드" class="main-banner__img" draggable="false" />
        </div>

        <section class="panel setup-panel" aria-labelledby="setupTitle">
          <div class="setup-title-img">
            <img src="/assets/game_title_jump.png" alt="말랑프렌즈 점프" draggable="false" />
          </div>

          <p id="setupHint" class="setup-hint">
            화면 좌우를 눌러 움직여요. <strong>🎲 랜덤</strong>은 숨겨진 친구도 추첨!
          </p>

          <article class="player-config" data-player-slot="0">
            <div class="player-config__top">
              <h3 class="player-config__name" data-player-name="0">모찌 토끼</h3>
              <p class="player-config__ability" data-player-ability="0"></p>
            </div>

            <div class="player-config__preview" data-preview-slot="0"></div>
            <div class="character-options" data-character-options="0"></div>
          </article>

          <div class="setup-actions">
            <button id="startGame" type="button" class="primary-action">시작!</button>
          </div>
        </section>
      </section>

      <section id="playScreen" class="screen screen--play">
        <header class="panel play-topbar">
          <div class="play-topbar__main">
            <div class="play-brand">
              <img src="/assets/game_title_jump.png" alt="" class="play-brand__icon" draggable="false" />
              <h2 id="playTitle" class="play-title">말랑프렌즈 점프</h2>
            </div>

            <div class="play-actions">
              <button id="backToSetup" type="button" class="secondary-action">설정</button>
              <button id="restart" type="button" class="secondary-action">다시</button>
            </div>
          </div>

          <div class="hud">
            <div class="hud__group">
              <div class="hud-card" data-hud-slot="0">
                <span class="hud-card__label">BEST</span>
                <strong id="best1" class="hud-card__value">0m</strong>
                <span id="life1" class="hud-card__meta">준비</span>
              </div>
            </div>

            <div id="status" class="hud__status">캐릭터를 골라 시작!</div>
          </div>
        </header>

        <section class="panel play-panel">
          <div id="arena" class="arena" aria-label="점프 게임 맵">
            <div id="world" class="world"></div>

            <div class="touch-hint" aria-hidden="true">
              <span>왼쪽 터치</span>
              <span>오른쪽 터치</span>
            </div>

            <div id="spectatorBadge" class="spectator-badge is-hidden">
              <img src="/assets/badge_spectator.png" alt="관전" draggable="false" />
            </div>

            <div id="chatOverlay" class="chat-overlay is-hidden" aria-label="채팅">
              <div id="chatMessages" class="chat-messages" aria-live="polite"></div>
              <div class="chat-input-bar">
                <button id="chatToggle" type="button" class="chat-toggle" aria-label="채팅 열기">💬</button>
                <div id="chatInputWrap" class="chat-input-wrap">
                  <input id="chatInput" type="text" class="chat-input-field" placeholder="채팅..." maxlength="80" autocomplete="off" />
                  <button id="chatSend" type="button" class="chat-send-btn">전송</button>
                </div>
              </div>
            </div>

            <div id="characterIntro" class="character-intro is-hidden" aria-hidden="true">
              <div class="character-intro__burst"></div>
              <img id="introCharImg" class="character-intro__sprite" src="" alt="" draggable="false" />
              <h2 id="introCharName" class="character-intro__name"></h2>
              <p id="introCharAbility" class="character-intro__ability"></p>
            </div>

            <div id="resultsOverlay" class="results-overlay" aria-live="polite">
              <div class="results-card">
                <div class="results-trophy">
                  <img src="/assets/result_trophy.png" alt="" draggable="false" />
                </div>
                <h2 class="results-title">결과</h2>
                <div class="results-list">
                  <div class="result-row" data-result-slot="0">
                    <span class="result-row__label" id="resultName1">YOU</span>
                    <strong id="resultScore1">0m</strong>
                  </div>
                  <div class="result-row" data-result-slot="1">
                    <span class="result-row__label" id="resultName2">2P</span>
                    <strong id="resultScore2">0m</strong>
                  </div>
                </div>
                <div id="resultLead" class="results-lead">한 번 더 도전!</div>
                <div class="results-actions">
                  <button id="restartFromResults" type="button" class="primary-action">한 판 더</button>
                  <button id="exitAfterResults" type="button" class="secondary-action">허브로</button>
                </div>
              </div>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="/games/registry.js"></script>
    <script src="/shared/bootstrap.js"></script>
    <script src="/lobby/config.js"></script>
    <script src="./game.js"></script>
  </body>
</html>
