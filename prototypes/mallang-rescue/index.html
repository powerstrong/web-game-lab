<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>말랑프렌즈 풍선 구조대</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="rescue-app">
      <section id="waitScreen" class="screen is-active">
        <div class="wait-panel">
          <div class="brand-mark">BR</div>
          <h1>말랑프렌즈 풍선 구조대</h1>
          <p id="waitStatus" class="wait-status">방에 접속하는 중...</p>
          <div id="playerList" class="player-list"></div>
          <button id="readyBtn" class="primary-btn" type="button" disabled>Ready</button>
        </div>
      </section>

      <section id="gameScreen" class="screen">
        <header class="hud">
          <div>
            <span class="hud-label">TIME</span>
            <strong id="timeLeft">1:15</strong>
          </div>
          <div>
            <span class="hud-label">SCORE</span>
            <strong id="score">0</strong>
          </div>
          <div>
            <span class="hud-label">COMBO</span>
            <strong id="combo">0</strong>
          </div>
        </header>

        <div id="toastArea" class="toast-area" aria-live="polite"></div>

        <section id="stage" class="stage" aria-label="낙하 라인">
          <button class="lane" type="button" data-lane="0"><span class="lane-number">1</span></button>
          <button class="lane" type="button" data-lane="1"><span class="lane-number">2</span></button>
          <button class="lane" type="button" data-lane="2"><span class="lane-number">3</span></button>
          <button class="lane" type="button" data-lane="3"><span class="lane-number">4</span></button>
          <div id="entityLayer" class="entity-layer"></div>
        </section>

        <footer class="tool-dock">
          <div class="role-line">
            <span id="roleBadge" class="role-badge">역할 확인 중</span>
            <span id="selectedToolLabel" class="selected-tool">선택 도구 없음</span>
          </div>
          <div id="toolButtons" class="tool-buttons"></div>
        </footer>
      </section>

      <section id="resultScreen" class="screen">
        <div class="result-panel">
          <p class="result-kicker">구조 완료</p>
          <div id="grade" class="grade">C</div>
          <h2 id="resultTitle">라운드 종료</h2>
          <div class="result-grid">
            <div><span>최종 점수</span><strong id="finalScore">0</strong></div>
            <div><span>구조 성공</span><strong id="rescuedCount">0</strong></div>
            <div><span>놓친 수</span><strong id="missedCount">0</strong></div>
            <div><span>최고 콤보</span><strong id="maxCombo">0</strong></div>
            <div><span>협동 구조</span><strong id="coopCount">0</strong></div>
          </div>
          <button id="exitBtn" class="primary-btn" type="button">로비로</button>
        </div>
      </section>
    </main>

    <script src="/games/registry.js"></script>
    <script src="/shared/bootstrap.js"></script>
    <script src="/lobby/config.js"></script>
    <script src="./game.js"></script>
  </body>
</html>
