<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rhythm Tap</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="panel">
        <p class="eyebrow">Timing Prototype</p>
        <h1>Rhythm Tap</h1>
        <p class="summary">
          박자가 중앙선에 가까워졌을 때 스페이스를 누르세요. 연속 성공으로 흐름감이
          생기는지 확인하는 실험입니다.
        </p>
      </section>

      <section class="panel">
        <div class="hud">
          <span id="score">Score 0</span>
          <span id="combo">Combo 0</span>
          <button id="restart" type="button">Restart</button>
        </div>
        <p id="message" class="message">Press restart, then hit space on the beat.</p>
        <div class="lane">
          <div class="center-line"></div>
          <div id="marker" class="marker"></div>
        </div>
      </section>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
