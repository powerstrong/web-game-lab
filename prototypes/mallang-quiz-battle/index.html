<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#7c3aed" />
    <title>말랑프렌즈 퀴즈배틀</title>
    <link rel="icon" href="../jump-climber/assets/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="game-shell">

      <!-- ── Setup Screen: 캐릭터 선택 + Ready ── -->
      <section id="setupScreen" class="screen screen--setup is-active">
        <section class="panel setup-panel" aria-labelledby="setupTitle">
          <p class="eyebrow">MALLANG QUIZ BATTLE</p>
          <h1 id="setupTitle">🧠 말랑프렌즈 퀴즈배틀</h1>
          <p class="setup-copy">캐릭터를 고르고 Ready를 누르면 퀴즈가 시작됩니다!</p>

          <div class="character-grid" aria-label="캐릭터 선택">
            <button class="character-card is-selected" type="button" data-character="mochi-rabbit">
              <img src="/prototypes/jump-climber/assets/토끼 메인 이미지.png" alt="모찌 토끼" class="character-card__img" />
              <strong>모찌 토끼</strong>
            </button>
            <button class="character-card" type="button" data-character="pudding-hamster">
              <img src="/prototypes/jump-climber/assets/햄스터 메인 이미지.png" alt="푸딩 햄스터" class="character-card__img" />
              <strong>푸딩 햄스터</strong>
            </button>
            <button class="character-card" type="button" data-character="peach-chick">
              <img src="/prototypes/jump-climber/assets/병아리 메인 이미지.png" alt="피치 병아리" class="character-card__img" />
              <strong>피치 병아리</strong>
            </button>
            <button class="character-card" type="button" data-character="latte-puppy">
              <img src="/prototypes/jump-climber/assets/라떼 메인 이미지.png" alt="라떼 강아지" class="character-card__img" />
              <strong>라떼 강아지</strong>
            </button>
            <button class="character-card" type="button" data-character="mint-kitten">
              <img src="/prototypes/jump-climber/assets/고양이 메인이미지.png" alt="민트 고양이" class="character-card__img" />
              <strong>민트 고양이</strong>
            </button>
          </div>

          <div id="waitingPlayers" class="waiting-players" aria-label="대기 중인 플레이어" aria-live="polite"></div>

          <div class="setup-actions">
            <button id="readyBtn" type="button" class="primary-action">Ready!</button>
          </div>
        </section>
      </section>

      <!-- ── Game Screen: 점수 바 + 퀴즈 + 채팅 ── -->
      <section id="gameScreen" class="screen screen--game">

        <!-- 항상 표시되는 점수 패널 -->
        <div id="scoreBar" class="score-bar" aria-label="현재 점수" aria-live="polite"></div>

        <section class="panel quiz-panel">
          <div class="quiz-header">
            <span id="questionProgress" class="question-progress"></span>
            <div id="timerDisplay" class="timer-display" aria-label="남은 시간"></div>
          </div>

          <!-- 카운트다운 오버레이 -->
          <div id="countdownOverlay" class="countdown-overlay is-hidden" aria-live="assertive">
            <div id="countdownNumber" class="countdown-number">3</div>
            <p class="countdown-label">준비!</p>
          </div>

          <!-- 퀴즈 본문 -->
          <p id="questionText" class="question-text"></p>

          <!-- 보기 버튼 2×2 그리드 -->
          <div id="optionGrid" class="option-grid" role="group" aria-label="보기"></div>

          <!-- 정답 공개 패널 -->
          <div id="revealPanel" class="reveal-panel is-hidden" aria-live="polite">
            <div id="revealResult" class="reveal-result"></div>
            <p id="revealExplanation" class="reveal-explanation"></p>
          </div>
        </section>

        <!-- 채팅 오버레이 (jump-climber 방식) -->
        <div id="chatOverlay" class="chat-overlay is-hidden" aria-label="채팅">
          <div id="chatMessages" class="chat-messages" aria-live="polite"></div>
          <div class="chat-input-bar">
            <button id="chatToggle" type="button" class="chat-toggle" aria-label="채팅 열기">💬</button>
            <div id="chatInputWrap" class="chat-input-wrap">
              <input id="chatInput" type="text" class="chat-input-field" placeholder="채팅..." maxlength="80" autocomplete="off" />
              <button id="chatSend" type="button" class="chat-send-btn">전송</button>
            </div>
          </div>
        </div>
      </section>

      <!-- ── Result Screen: 우승자 + 순위 ── -->
      <section id="resultScreen" class="screen screen--result">
        <div id="resultWinner" class="result-winner">
          <div class="winner-crown">🏆</div>
          <img id="winnerChar" class="winner-char" src="" alt="" />
          <h2 id="winnerName" class="winner-name"></h2>
          <p id="winnerScore" class="winner-score"></p>
        </div>

        <section class="panel rankings-panel" aria-labelledby="rankingsTitle">
          <p class="eyebrow">최종 순위</p>
          <ol id="rankingsList" class="rankings-list"></ol>
          <div class="result-actions">
            <button id="exitBtn" type="button" class="secondary-action">로비로 돌아가기</button>
          </div>
        </section>
      </section>

    </main>

    <script src="/games/registry.js"></script>
    <script src="/shared/bootstrap.js"></script>
    <script src="/lobby/config.js"></script>
    <script src="./game.js"></script>
  </body>
</html>
