<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ff9f50" />
    <title>말랑프렌즈 줄다리기</title>
    <link rel="icon" href="../jump-climber/assets/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="game-shell">
      <section id="setupScreen" class="screen screen--setup is-active">
        <section class="panel setup-panel" aria-labelledby="setupTitle">
          <p class="eyebrow">MALLANG TUG WAR</p>
          <h1 id="setupTitle">🪢 말랑프렌즈 줄다리기</h1>
          <p class="setup-copy">캐릭터를 고르고 Ready를 누르면 다음 Phase에서 1v1 줄다리기가 시작됩니다.</p>

          <div class="character-grid" aria-label="캐릭터 선택">
            <button class="character-card is-selected" type="button" data-character="mochi-rabbit">
              <strong>모찌 토끼</strong>
              <span>mochi-rabbit</span>
            </button>
            <button class="character-card" type="button" data-character="pudding-hamster">
              <strong>푸딩 햄스터</strong>
              <span>pudding-hamster</span>
            </button>
            <button class="character-card" type="button" data-character="peach-chick">
              <strong>피치 병아리</strong>
              <span>peach-chick</span>
            </button>
          </div>

          <div class="setup-actions">
            <button id="tug-ready-btn" type="button" class="primary-action">Ready</button>
          </div>
        </section>
      </section>

      <section id="playScreen" class="screen screen--play">
        <header class="panel play-topbar">
          <div>
            <p class="eyebrow">LIVE DUEL</p>
            <h2>말랑프렌즈 줄다리기</h2>
          </div>
          <div id="connectionStatus" class="status-pill">대기 중</div>
        </header>

        <section class="panel play-panel">
          <div class="arena" aria-label="줄다리기 게임 화면">
            <div class="tug-character tug-character--left">LEFT</div>
            <div class="tug-character tug-character--right">RIGHT</div>
            <div class="tug-rope" aria-hidden="true">
              <span></span>
            </div>
            <div class="rhythm-ring-container">곧 시작합니다</div>
            <div class="judgement-popup" aria-live="polite"></div>
          </div>
        </section>
      </section>

      <section id="resultScreen" class="screen screen--result">
        <section class="panel result-panel" aria-labelledby="resultTitle">
          <p class="eyebrow">RESULT</p>
          <h2 id="resultTitle">결과 준비 중</h2>
          <p>Phase B 이후 결과 화면을 연결합니다.</p>
        </section>
      </section>
    </main>

    <script src="/games/registry.js"></script>
    <script src="/shared/bootstrap.js"></script>
    <script src="/lobby/config.js"></script>
    <script src="./game.js"></script>
  </body>
</html>
