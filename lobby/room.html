<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게임 대기실</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&family=Outfit:wght@600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="room.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <p class="topbar-label">MATCH LOBBY</p>
      <span class="logo">시작 전 마지막 준비</span>
    </div>

    <div class="room-tools">
      <div class="room-code-block">
        <span class="room-code-label">방 코드</span>
        <span class="room-code-value" id="room-code-display">----</span>
        <button class="copy-btn" id="copy-btn" title="복사">복사</button>
      </div>
      <div class="status-wrap">
        <div class="conn-indicator connecting" id="conn-indicator"></div>
        <span class="conn-label" id="conn-label">연결 중...</span>
      </div>
    </div>
  </header>

  <main class="layout">
    <section class="stage">
      <p class="section-kicker">GAME SELECT</p>
      <h1 class="stage-title">이번 판은 어떤 게임으로 갈까요?</h1>

      <div class="game-list" id="game-list">
        <!-- populated by room.js from GAME_REGISTRY -->
      </div>

      <div class="start-box">
        <div class="start-tally" id="start-tally">0명 준비 완료</div>
        <button class="btn btn-start" id="start-btn">준비 완료 (0/0)</button>
      </div>
    </section>

    <aside class="sidebar">
      <section class="side-panel">
        <p class="section-kicker">PLAYERS</p>
        <h2 class="panel-title">현재 참가자</h2>
        <div class="player-list" id="player-list"></div>
      </section>

      <section class="side-panel chat-panel">
        <p class="section-kicker">LIVE CHAT</p>
        <h2 class="panel-title">빠른 대화</h2>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-row">
          <input
            type="text"
            class="chat-input"
            id="chat-input"
            placeholder="메시지를 입력하세요"
            maxlength="100"
            autocomplete="off"
            spellcheck="false"
          />
          <button class="btn btn-send" id="send-btn">전송</button>
        </div>
      </section>
    </aside>
  </main>

  <div class="countdown-overlay" id="countdown-overlay">
    <div class="overlay-card">
      <div class="countdown-label">매치 시작</div>
      <div class="countdown-number" id="countdown-number">3</div>
      <div class="countdown-game-name" id="countdown-game-name"></div>
    </div>
  </div>

  <div class="scoreboard-overlay" id="scoreboard-overlay">
    <div class="overlay-card scoreboard-card">
      <div class="countdown-label">결과 발표</div>
      <ol class="scoreboard-list" id="scoreboard-list"></ol>
      <div class="scoreboard-status" id="scoreboard-status"></div>
      <button class="btn btn-start" id="rematch-btn">다시 하기</button>
    </div>
  </div>

  <div class="disconnect-overlay" id="disconnect-overlay">
    <div class="overlay-card">
      <div class="disconnect-title">연결이 끊어졌습니다</div>
      <div class="disconnect-msg" id="disconnect-msg">잠시 후 다시 연결합니다.</div>
      <button class="btn btn-reconnect" id="reconnect-btn">다시 연결</button>
    </div>
  </div>

  <script src="../games/registry.js"></script>
  <script src="config.js"></script>
  <script src="room.js"></script>
</body>
</html>
