<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게임 대기실</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&family=Outfit:wght@600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="room.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <p class="topbar-label">ROOM</p>
      <span class="logo">같이 고르고 같이 시작</span>
    </div>

    <div class="room-tools">
      <div class="room-code-block">
        <span class="room-code-label">방 코드</span>
        <span class="room-code-value" id="room-code-display">----</span>
        <button class="copy-btn" id="copy-btn" title="복사">복사</button>
      </div>
      <div class="status-wrap">
        <div class="conn-indicator connecting" id="conn-indicator"></div>
        <span class="conn-label" id="conn-label">연결 중...</span>
      </div>
    </div>
  </header>

  <main class="layout">
    <section class="stage">
      <p class="section-kicker">오늘 뭐 할까?</p>
      <h1 class="stage-title">하나 고르고 준비 누르기</h1>

      <div class="game-list">
        <button class="game-card" id="card-dodge-square" data-game="dodge-square" type="button">
          <span class="game-badge">A</span>
          <span class="game-text">
            <strong>네모 피하기</strong>
            <small>끝까지 버텨라</small>
          </span>
          <span class="vote-badge" id="badge-dodge-square">0</span>
        </button>

        <button class="game-card" id="card-rhythm-tap" data-game="rhythm-tap" type="button">
          <span class="game-badge">B</span>
          <span class="game-text">
            <strong>박자 맞추기</strong>
            <small>정확하게 눌러라</small>
          </span>
          <span class="vote-badge" id="badge-rhythm-tap">0</span>
        </button>
      </div>

      <div class="start-box">
        <div class="start-tally" id="start-tally">0명 준비</div>
        <button class="btn btn-start" id="start-btn">준비! (0/0)</button>
      </div>
    </section>

    <aside class="sidebar">
      <section class="side-panel">
        <p class="section-kicker">멤버</p>
        <h2 class="panel-title">지금 여기</h2>
        <div class="player-list" id="player-list"></div>
      </section>

      <section class="side-panel chat-panel">
        <p class="section-kicker">채팅</p>
        <h2 class="panel-title">짧게 한마디</h2>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-row">
          <input
            type="text"
            class="chat-input"
            id="chat-input"
            placeholder="하고 싶은 말"
            maxlength="100"
            autocomplete="off"
            spellcheck="false"
          />
          <button class="btn btn-send" id="send-btn">전송</button>
        </div>
      </section>
    </aside>
  </main>

  <div class="countdown-overlay" id="countdown-overlay">
    <div class="overlay-card">
      <div class="countdown-label">시작!</div>
      <div class="countdown-number" id="countdown-number">3</div>
      <div class="countdown-game-name" id="countdown-game-name"></div>
    </div>
  </div>

  <div class="disconnect-overlay" id="disconnect-overlay">
    <div class="overlay-card">
      <div class="disconnect-title">연결 끊김</div>
      <div class="disconnect-msg" id="disconnect-msg">잠깐만, 다시 붙는 중...</div>
      <button class="btn btn-reconnect" id="reconnect-btn">다시 연결</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="room.js"></script>
</body>
</html>
