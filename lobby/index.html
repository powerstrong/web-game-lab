<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게임 로비</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&family=Outfit:wght@600;700;800&display=swap"
    rel="stylesheet"
  />
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      color-scheme: light;
      --bg: #f4f7ff;
      --surface: rgba(255, 255, 255, 0.9);
      --surface-strong: #ffffff;
      --ink: #182338;
      --muted: #60708c;
      --accent: #4b6bff;
      --accent-strong: #2f51f5;
      --accent-soft: rgba(75, 107, 255, 0.1);
      --danger: #eb5b73;
      --border: rgba(24, 35, 56, 0.1);
      --shadow: 0 24px 60px rgba(70, 88, 146, 0.14);
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 16px;
      display: grid;
      place-items: center;
      font-family: "Noto Sans KR", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(75, 107, 255, 0.18), transparent 30%),
        linear-gradient(180deg, #fbfcff 0%, var(--bg) 100%);
    }

    .shell {
      width: min(100%, 640px);
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--surface);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .eyebrow {
      margin: 0;
      color: var(--accent-strong);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 12px 0 0;
      font-family: "Outfit", "Noto Sans KR", sans-serif;
      font-size: clamp(2.2rem, 8vw, 4rem);
      line-height: 0.98;
      letter-spacing: -0.05em;
    }

    .lead {
      margin: 14px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .field {
      margin-top: 22px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.94rem;
      font-weight: 700;
      color: var(--muted);
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      min-height: 54px;
      border: 1px solid rgba(75, 107, 255, 0.14);
      border-radius: 16px;
      background: #f8faff;
      color: var(--ink);
      font: inherit;
      padding: 0.85rem 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input[type="text"]:focus,
    input[type="number"]:focus {
      border-color: rgba(75, 107, 255, 0.42);
      box-shadow: 0 0 0 4px rgba(75, 107, 255, 0.1);
      background: #fff;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"] { -moz-appearance: textfield; }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .join-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      min-height: 54px;
      border: none;
      border-radius: 16px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.2s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.55; cursor: wait; transform: none; }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
      color: #fff;
      box-shadow: 0 16px 28px rgba(75, 107, 255, 0.24);
    }

    .btn-secondary {
      background: #edf2ff;
      color: var(--accent-strong);
    }

    .error-msg {
      min-height: 1.2rem;
      margin-top: 8px;
      color: var(--danger);
      font-size: 0.9rem;
    }

    .tip {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 16px;
      background: var(--surface-strong);
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.55;
    }

    @media (max-width: 560px) {
      body {
        padding: 12px;
      }

      .shell {
        padding: 22px 18px;
        border-radius: 22px;
      }

      .actions,
      .join-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <p class="eyebrow">GAME LOBBY</p>
    <h1>방을 열고<br />플레이어를 모으세요</h1>
    <p class="lead">닉네임을 정한 뒤 새 방을 만들거나, 공유받은 코드로 바로 합류하면 됩니다.</p>

    <section class="field">
      <label for="player-name">닉네임</label>
      <input
        type="text"
        id="player-name"
        placeholder="예: 민지"
        maxlength="16"
        autocomplete="off"
        spellcheck="false"
      />
      <div class="error-msg" id="name-error"></div>
    </section>

    <section class="field">
      <div class="actions">
        <button class="btn btn-primary" id="create-btn">새 방 만들기</button>
        <button class="btn btn-secondary" id="focus-join-btn" type="button">코드로 참가</button>
      </div>
      <div class="error-msg" id="create-error"></div>
    </section>

    <section class="field">
      <label for="room-code">방 코드</label>
      <div class="join-row">
        <input
          type="number"
          id="room-code"
          placeholder="1234"
          min="1000"
          max="9999"
        />
        <button class="btn btn-secondary" id="join-btn">입장</button>
      </div>
      <div class="error-msg" id="join-error"></div>
    </section>

    <p class="tip" id="game-tip">방을 만든 플레이어가 판을 여는 호스트가 되고, 나머지는 코드로 바로 합류합니다.</p>
  </main>

  <script src="../games/registry.js"></script>
  <script src="config.js"></script>
  <script>
    const nameInput = document.getElementById('player-name');
    const codeInput = document.getElementById('room-code');
    const createBtn = document.getElementById('create-btn');
    const focusJoinBtn = document.getElementById('focus-join-btn');
    const joinBtn = document.getElementById('join-btn');
    const nameError = document.getElementById('name-error');
    const createError = document.getElementById('create-error');
    const joinError = document.getElementById('join-error');

    const preselectedGameId = new URLSearchParams(window.location.search).get('gameId');

    // Show hint when a specific game was chosen from the hub
    if (preselectedGameId && window.GAME_REGISTRY) {
      const game = window.GAME_REGISTRY.find(g => g.id === preselectedGameId);
      if (game) {
        const tip = document.getElementById('game-tip');
        tip.textContent = `선택된 게임: ${game.title} — 방에 입장하면 자동으로 선택됩니다.`;
      }
    }

    function roomUrl(code, name) {
      let url = `room.html?code=${encodeURIComponent(code)}&name=${encodeURIComponent(name)}`;
      if (preselectedGameId) url += `&gameId=${encodeURIComponent(preselectedGameId)}`;
      return url;
    }

    const savedName = sessionStorage.getItem('playerName');
    if (savedName) nameInput.value = savedName;

    nameInput.addEventListener('input', () => {
      sessionStorage.setItem('playerName', nameInput.value.trim());
      nameError.textContent = '';
    });

    focusJoinBtn.addEventListener('click', () => {
      codeInput.focus();
    });

    function getValidName() {
      const name = nameInput.value.trim();
      if (!name) {
        nameError.textContent = '닉네임을 입력해 주세요.';
        nameInput.focus();
        return null;
      }
      return name;
    }

    createBtn.addEventListener('click', async () => {
      const name = getValidName();
      if (!name) return;

      createBtn.disabled = true;
      createBtn.textContent = '방 생성 중...';
      createError.textContent = '';

      try {
        const res = await fetch(`${window.WORKER_URL}/api/rooms`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ hostName: name }),
        });

        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          throw new Error(body.error || `서버 오류 (${res.status})`);
        }

        const data = await res.json();
        const code = data.code || data.roomCode;
        sessionStorage.setItem('playerName', name);
        window.location.href = roomUrl(code, name);
      } catch (err) {
        createError.textContent = err.message;
        createBtn.disabled = false;
        createBtn.textContent = '새 방 만들기';
      }
    });

    joinBtn.addEventListener('click', () => {
      const name = getValidName();
      if (!name) return;

      joinError.textContent = '';
      const raw = codeInput.value.trim();
      if (!raw || !/^\d{4}$/.test(raw)) {
        joinError.textContent = '4자리 숫자를 입력해 주세요.';
        codeInput.focus();
        return;
      }

      sessionStorage.setItem('playerName', name);
      window.location.href = roomUrl(raw, name);
    });

    codeInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') joinBtn.click();
    });
  </script>
</body>
</html>
